<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>锦鲤 · 用户统计</title>
<style>
 *{box-sizing:border-box}
 body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#FAF5EC;color:#2B2722;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
 h1{font-size:18px;margin:0 0 4px;}
 .sub{font-size:12.5px;color:#9A8F7E;margin-bottom:22px;}
 .card{background:#fff;border:1px solid #E3D8C5;border-radius:18px;padding:30px 40px;text-align:center;box-shadow:0 8px 24px rgba(180,150,100,.12);min-width:240px;}
 .label{font-size:13px;color:#9A8F7E;margin-bottom:8px;}
 .num{font-size:54px;font-weight:800;color:#E0694A;line-height:1.1;}
 .num.load{font-size:22px;color:#C9BCA6;}
 .since{font-size:11.5px;color:#B3A793;margin-top:10px;}
 button{margin-top:22px;border:none;border-radius:10px;padding:9px 20px;font-size:13.5px;font-weight:700;background:#fff;border:1px solid #E3D8C5;color:#9A8F7E;cursor:pointer;font-family:inherit;}
 .note{font-size:11.5px;color:#B3A793;margin-top:18px;max-width:300px;line-height:1.7;text-align:center;}
</style>
</head>
<body>
 <h1>🧧 锦鲤 · 用户统计</h1>
 <div class="sub">来访学员数据(VerCount · 国内可达)</div>
 <div class="card">
  <div class="label">累计访问人数 (UV)</div>
  <div class="num" id="uvWrap"><span id="busuanzi_value_site_uv">读取中…</span></div>
  <div class="since">总访问次数 (PV):<span id="busuanzi_value_site_pv">…</span></div>
  <button id="refresh">🔄 刷新</button>
 </div>
 <div class="note">说明:UV=去重后的访问人数(同一台设备多次访问只算 1),PV=总打开次数。统计的是「打开过工具的人」,不是「成功解锁的人」——纯前端无后端,这已是最接近真实使用量、且国内打得开的口径。换设备/清缓存可能让同一人被重复计 1 次。</div>
<script defer src="https://cn.vercount.one/js"></script>
<script>
document.getElementById("refresh").addEventListener("click",function(){location.reload();});
</script>
</body>
</html>
