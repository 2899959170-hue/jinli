<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>实习翻译机 · 更新蓝贴</title>
<style>
:root{
 --bg:#FAF5EC;--surface:#fff;--surface-2:#FBF6EE;--ink:#2B2722;--ink-2:#4A463F;
 --koi:#E0694A;--koi-deep:#C24E32;--koi-line:#EAD2C5;--sage:#5E7A63;--sage-bg:#EDF2EC;--sage-line:#CFE0CF;
 --dim:#9A8F7E;--muted:#B3A793;--border:#E8DECB;--border-strong:#DCCEB4;
 --serif:"Noto Serif SC",ui-serif,Georgia,"Songti SC",serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;}
.wrap{max-width:720px;margin:0 auto;padding:0 18px 60px;}
.hero{text-align:center;padding:42px 18px 22px;}
.hero .seal{display:inline-block;font-family:var(--serif);font-weight:700;color:#fff;background:var(--koi);border-radius:8px;padding:3px 13px;font-size:12.5px;letter-spacing:.14em;margin-bottom:14px;box-shadow:0 8px 18px -10px rgba(224,105,74,.7);}
.hero h1{font-family:var(--serif);font-size:29px;margin:6px 0 6px;letter-spacing:.02em;}
.hero h1 em{font-style:normal;color:var(--koi);}
.hero .ver{font-size:13px;color:var(--dim);}
.hero .ver b{color:var(--koi-deep);font-family:var(--serif);}
.intro{background:linear-gradient(170deg,#FCF1EA,#FBF6EE);border:1px solid var(--koi-line);border-radius:18px;padding:18px 18px;margin-top:6px;font-size:14px;color:var(--ink-2);line-height:1.8;}
section{margin-top:34px;}
.shd{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;}
.shd .ic{font-size:20px;}
.shd h2{font-family:var(--serif);font-size:21px;margin:0;}
.chg{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:15px 16px;margin-bottom:12px;box-shadow:0 10px 26px -22px rgba(180,140,90,.6);}
.chg .ti{font-family:var(--serif);font-weight:700;font-size:16px;margin-bottom:11px;display:flex;align-items:center;gap:7px;}
.chg .ti .new{font-size:10.5px;font-weight:700;color:#fff;background:var(--koi);border-radius:20px;padding:1px 8px;letter-spacing:.04em;}
.ba{display:grid;grid-template-columns:1fr 26px 1fr;align-items:stretch;gap:0;}
@media(max-width:520px){.ba{grid-template-columns:1fr;}.ba .arr{transform:rotate(90deg);margin:4px auto;}}
.box{border-radius:11px;padding:10px 12px;font-size:13px;line-height:1.6;}
.box.old{background:#F4EEE4;color:#8C8473;border:1px solid #E7DDCB;}
.box.old .lb{font-size:10.5px;font-weight:700;color:#B3A793;letter-spacing:.06em;margin-bottom:4px;}
.box.now{background:linear-gradient(160deg,#FFF3EC,#FBE6DB);color:var(--ink);border:1px solid var(--koi-line);}
.box.now .lb{font-size:10.5px;font-weight:700;color:var(--koi-deep);letter-spacing:.06em;margin-bottom:4px;}
.arr{display:flex;align-items:center;justify-content:center;color:var(--koi);font-weight:700;font-size:16px;}
.cta{margin-top:42px;text-align:center;background:linear-gradient(170deg,#FCF1EA,#FBF6EE);border:1px solid var(--koi-line);border-radius:20px;padding:28px 22px;}
.cta h3{font-family:var(--serif);font-size:19px;margin:0 0 8px;}
.cta p{color:var(--dim);font-size:13px;margin:0 0 16px;}
.cta a{display:inline-block;text-decoration:none;font-weight:700;color:#fff;background:linear-gradient(135deg,#F2845C,var(--koi) 55%,var(--koi-deep));border-radius:14px;padding:13px 28px;font-size:15.5px;box-shadow:0 12px 26px -8px rgba(224,105,74,.7);margin:4px;}
.cta a.alt{background:none;color:var(--koi-deep);border:1px solid var(--koi-line);box-shadow:none;}
.foot{text-align:center;color:var(--muted);font-size:11.5px;margin-top:24px;}
</style>
</head>
<body>
<div class="hero">
 <span class="seal">更 新 蓝 贴</span>
 <h1>实习<em>翻译机</em> · 大版本更新</h1>
 <div class="ver">版本 <b>v2.0 · 锦鲤养成</b> · 2026.06</div>
</div>
<div class="wrap">
 <div class="intro">这一版围绕「<b>更可爱、更能用、更不丢</b>」做了一轮大升级——锦鲤从 6 段扩到 12 段萌系进化、满级化身奶龙;简历能力重做得能直接抄进简历;还加了数据迁移、隐藏彩蛋和一整套情绪价值系统。下面是 <b>原来 → 现在</b> 的对照。</div>

 <section id="sec"></section>

 <div class="cta">
  <h3>更新已上线 · 打开就是新版</h3>
  <p>工具免费 · 凭邀请码解锁 · 数据存你自己手机本地</p>
  <a href="https://2899959170-hue.github.io/" target="_blank" rel="noopener">去体验新版 →</a>
  <a class="alt" href="https://2899959170-hue.github.io/tujian.html" target="_blank" rel="noopener">看功能图鉴</a>
 </div>
 <div class="foot">实习翻译机 · 锦鲤版 · 本页为更新公告,可截图发小红书 🧧</div>
</div>
<script>
var GROUPS=[
 {ic:"🐟",h:"锦鲤养成 · 萌系大改",items:[
  {t:"锦鲤进化段数",new:1,old:"6 段(锦鲤苗 → 化龙),30 条满级,化龙偏「鲇鱼感」",now:"12 段可爱进化(奶团子 → 锦鲤奶龙),50 条满级,款款换色"},
  {t:"锦鲤长相",old:"普通侧身锦鲤,造型一般",now:"圆胖身 + 大眼睛 + 睫毛 + 腮红 + 星星高光,女性向萌系"},
  {t:"满级形态",new:1,old:"喷火长角的化龙",now:"奶黄圆滚滚的「锦鲤奶龙」🐉 + 星星皇冠"},
  {t:"配色",old:"红/金传统锦鲤色",now:"12 款马卡龙粉彩:奶油/草莓/蜜桃/樱花/薄荷/葡萄/星河/黄金/月光/彩虹…"}
 ]},
 {ic:"💗",h:"情绪价值系统",items:[
  {t:"鼓励文案(鸡汤)",old:"16 条随机",now:"50 条随机,且防止连续重复"},
  {t:"签名(抽签)",old:"8 种签",now:"16 种签 + 1 种 0.1% 隐藏款"},
  {t:"里程碑",old:"5 档(3/7/14/21/30 条)",now:"11 档(加 5/10/40/50/66/100 条)"},
  {t:"万分之一隐藏签",new:1,old:"无",now:"0.1% 概率刷出传说签 → 全屏金色花瓣雨 + 奶龙高光特效"},
  {t:"签名收集册",new:1,old:"无",now:"晒锦鲤页可收集:抽到点亮、没抽到暗着,含隐藏款"}
 ]},
 {ic:"📄",h:"简历能力 · 重做",items:[
  {t:"按 JD 定制",old:"输出一整段流水账,还带「相关能力可迁移至…」求职信尾巴,不能直接用",now:"输出可直接抄的简历 bullet 条目,JD 最相关的排最前,删掉求职信式句子"},
  {t:"通用简历",old:"太长、有重复、没融合记录",now:"AI 合并去重、按方向归类,真正按总字数上限截断"},
  {t:"防杜撰",new:1,old:"信息少时会乱编数字(如全填 1 也给个 20%)",now:"铁律:绝不编数字成果;信息太少会提示你补充,不硬编"},
  {t:"字数控制",old:"设了上限但 AI 经常无视、超很多",now:"前端强制按字数截断,真正卡住上限"}
 ]},
 {ic:"🧳",h:"防丢 & 账号",items:[
  {t:"数据迁移",new:1,old:"无,换手机/换浏览器/换域名就丢",now:"「数据迁移包」一键打包成迁移码或下载备份,新设备粘回即恢复"},
  {t:"邀请码说明",old:"只有一个输入框",now:"说清:邀请码=账号、数据存本地、记得用浏览器打开、只填一次"}
 ]},
 {ic:"🎬",h:"彩蛋 & 演示",items:[
  {t:"功能图鉴页",new:1,old:"无",now:"全新图鉴页:12 段锦鲤、50 鸡汤含概率、彩蛋实时特效演示"},
  {t:"彩蛋特效",old:"无展示",now:"化龙游动、花瓣雨、金色隐藏款高光、循环抽签,全部可视化"}
 ]},
 {ic:"🚀",h:"获客 & 体验",items:[
  {t:"网址",old:"…github.io/jinli/(带子路径)",now:"根域名直达 2899959170-hue.github.io"},
  {t:"解锁按钮",old:"普通按钮,获客链接藏在底部小字",now:"渐变呼吸大按钮;没填码点它直接带去找作者领码"},
  {t:"访问统计",old:"counterapi(国内常打不开、微信拦)",now:"换成 VerCount,国内可达更准"}
 ]}
];
var html="";
GROUPS.forEach(function(g){
 html+='<div class="shd"><span class="ic">'+g.ic+'</span><h2>'+g.h+'</h2></div>';
 g.items.forEach(function(it){
  html+='<div class="chg"><div class="ti">'+it.t+(it.new?'<span class="new">NEW</span>':'')+'</div>'+
   '<div class="ba"><div class="box old"><div class="lb">原来</div>'+it.old+'</div>'+
   '<div class="arr">→</div>'+
   '<div class="box now"><div class="lb">现在</div>'+it.now+'</div></div></div>';
 });
});
document.getElementById("sec").innerHTML=html;
</script>
</body>
</html>
