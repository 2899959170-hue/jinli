<title>实习翻译机 · 更新蓝贴</title>
<style>
:root{
 --bg:#FAF5EC;--surface:#fff;--surface-2:#FBF6EE;--ink:#2B2722;--ink-2:#4A463F;
 --koi:#E0694A;--koi-deep:#C24E32;--koi-line:#EAD2C5;--sage:#5E7A63;--sage-bg:#EDF2EC;--sage-line:#CFE0CF;
 --dim:#9A8F7E;--muted:#B3A793;--border:#E8DECB;--border-strong:#DCCEB4;
 --serif:"Noto Serif SC",ui-serif,Georgia,"Songti SC",serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{margin:0;font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;}
.wrap{max-width:720px;margin:0 auto;padding:0 18px 60px;}
.hero{text-align:center;padding:42px 18px 22px;}
.hero .seal{display:inline-block;font-family:var(--serif);font-weight:700;color:#fff;background:var(--koi);border-radius:8px;padding:3px 13px;font-size:12.5px;letter-spacing:.14em;margin-bottom:14px;box-shadow:0 8px 18px -10px rgba(224,105,74,.7);}
.hero h1{font-family:var(--serif);font-size:29px;margin:6px 0 6px;letter-spacing:.02em;}
.hero h1 em{font-style:normal;color:var(--koi);}
.hero .ver{font-size:13px;color:var(--dim);}
.hero .ver b{color:var(--koi-deep);font-family:var(--serif);}
.intro{background:linear-gradient(170deg,#FCF1EA,#FBF6EE);border:1px solid var(--koi-line);border-radius:18px;padding:18px 18px;margin-top:6px;font-size:14px;color:var(--ink-2);line-height:1.8;}
section{margin-top:34px;}
.shd{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;}
.shd .ic{font-size:20px;}
.shd h2{font-family:var(--serif);font-size:21px;margin:0;}
.chg{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:15px 16px;margin-bottom:12px;box-shadow:0 10px 26px -22px rgba(180,140,90,.6);}
.chg .ti{font-family:var(--serif);font-weight:700;font-size:16px;margin-bottom:11px;display:flex;align-items:center;gap:7px;}
.chg .ti .new{font-size:10.5px;font-weight:700;color:#fff;background:var(--koi);border-radius:20px;padding:1px 8px;letter-spacing:.04em;}
.ba{display:grid;grid-template-columns:1fr 26px 1fr;align-items:stretch;gap:0;}
@media(max-width:520px){.ba{grid-template-columns:1fr;}.ba .arr{transform:rotate(90deg);margin:4px auto;}}
.box{border-radius:11px;padding:10px 12px;font-size:13px;line-height:1.6;}
.box.old{background:#F4EEE4;color:#8C8473;border:1px solid #E7DDCB;}
.box.old .lb{font-size:10.5px;font-weight:700;color:#B3A793;letter-spacing:.06em;margin-bottom:4px;}
.box.now{background:linear-gradient(160deg,#FFF3EC,#FBE6DB);color:var(--ink);border:1px solid var(--koi-line);}
.box.now .lb{font-size:10.5px;font-weight:700;color:var(--koi-deep);letter-spacing:.06em;margin-bottom:4px;}
.arr{display:flex;align-items:center;justify-content:center;color:var(--koi);font-weight:700;font-size:16px;}
.shcard{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:18px 16px;margin-top:18px;box-shadow:0 12px 30px -22px rgba(180,140,90,.6);}
.shba{display:grid;grid-template-columns:1fr 30px 1fr;align-items:center;gap:0;}
@media(max-width:520px){.shba{grid-template-columns:1fr 22px 1fr;}}
.shside{text-align:center;}
.shside .lb{font-size:11px;font-weight:700;letter-spacing:.06em;margin-bottom:8px;}
.shside.old .lb{color:#B3A793;}.shside.now .lb{color:var(--koi-deep);}
.shstage{height:78px;display:flex;align-items:center;justify-content:center;border-radius:13px;}
.shside.old .shstage{background:#F4EEE4;}
.shside.now .shstage{background:linear-gradient(160deg,#FFF3EC,#FBE6DB);}
.sharr{display:flex;align-items:center;justify-content:center;color:var(--koi);font-weight:700;font-size:18px;}
.shtitle{font-family:var(--serif);font-weight:700;font-size:15px;text-align:center;margin-bottom:12px;}
.parade{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:6px;}
.pcell{width:74px;text-align:center;}
.pcell .pst{height:46px;display:flex;align-items:center;justify-content:center;}
.pcell .pn{font-size:10px;color:var(--dim);margin-top:2px;font-family:var(--serif);}
.pcell.big{width:90px;}.pcell.big .pst{height:58px;}
.vis{margin-top:11px;border-radius:12px;overflow:hidden;}
.visrow{display:flex;align-items:stretch;gap:8px;}
.visbox{flex:1;border-radius:10px;padding:9px 10px;font-size:12px;line-height:1.55;}
.visbox.o{background:#F4EEE4;color:#8C8473;border:1px solid #E7DDCB;}
.visbox.n{background:linear-gradient(160deg,#FFF7F0,#FBE9DD);color:var(--ink);border:1px solid var(--koi-line);}
.visbox .vl{font-size:10px;font-weight:700;letter-spacing:.05em;margin-bottom:4px;}
.visbox.o .vl{color:#B3A793;}.visbox.n .vl{color:var(--koi-deep);}
.minigrid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;}
.mcell{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;}
.mcell.lit{background:linear-gradient(160deg,#FFF3EC,#FBE3D6);border:1px solid var(--koi-line);color:var(--koi-deep);}
.mcell.dark{background:#F1EADF;color:#C7BBA8;}
.goldstage{height:64px;border-radius:11px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,#FFF7DC,#FBE6B6);}
.gp{position:absolute;top:-10px;width:8px;height:8px;border-radius:60% 0 60% 0;opacity:0;animation:gfall linear infinite;}
@keyframes gfall{0%{transform:translateY(-10px) rotate(0);opacity:0;}12%{opacity:1;}100%{transform:translateY(72px) translateX(var(--dx)) rotate(320deg);opacity:0;}}
.ghalo{position:absolute;left:50%;top:50%;width:80px;height:80px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(255,222,130,.7),transparent 70%);animation:ghpulse 1.6s ease-in-out infinite;}
@keyframes ghpulse{0%,100%{transform:translate(-50%,-50%) scale(.85);opacity:.6;}50%{transform:translate(-50%,-50%) scale(1.12);opacity:1;}}
svg .ktail{transform-origin:44px 44px;animation:ktail 1.4s ease-in-out infinite;}
svg .kfinA{transform-origin:94px 54px;animation:kfinA 1.7s ease-in-out infinite;}
@keyframes ktail{0%,100%{transform:rotate(-7deg);}50%{transform:rotate(7deg);}}
@keyframes kfinA{0%,100%{transform:rotate(0);}50%{transform:rotate(-12deg);}}
.cta{margin-top:42px;text-align:center;background:linear-gradient(170deg,#FCF1EA,#FBF6EE);border:1px solid var(--koi-line);border-radius:20px;padding:28px 22px;}
.cta h3{font-family:var(--serif);font-size:19px;margin:0 0 8px;}
.cta p{color:var(--dim);font-size:13px;margin:0 0 16px;}
.cta a{display:inline-block;text-decoration:none;font-weight:700;color:#fff;background:linear-gradient(135deg,#F2845C,var(--koi) 55%,var(--koi-deep));border-radius:14px;padding:13px 28px;font-size:15.5px;box-shadow:0 12px 26px -8px rgba(224,105,74,.7);margin:4px;}
.cta a.alt{background:none;color:var(--koi-deep);border:1px solid var(--koi-line);box-shadow:none;}
.foot{text-align:center;color:var(--muted);font-size:11.5px;margin-top:24px;}
</style>
